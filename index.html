<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O1</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
    <script src="https://unpkg.com/aframe-orbit-controls@1.3.2/dist/aframe-orbit-controls.min.js"></script>
    <script src="index.js"></script>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
  </head>

  <body>
      <div class="overlay" id="openingText"></div>
      <div class="overlay" id="logo">
        <a href="index.html"><img src="library/logo.png" alt="webapge logo""></a>
      </div>
      <div class="overlay" id="help"><img src="library/menu-01.png" alt="help button"></div>
      <div class="overlay" id="help_overlay">So your a bit lost. Use your mouse to hover around and when an object reacts thats when you know when to click ;)</div>

      <!-- Environment setup was assisted with the use of external tools -->
      <a-scene cursor="rayOrigin: mouse" renderer="shadow: true; shadowMapType: pcfsoft">

      <!--Lighting setup-->
      <a-light 
        type="directional"
        position="0 20 20"
        intensity="1.5"
        castShadow="true"
      ></a-light>

      <!-- Environment setuo -->
      <a-entity
        id="environment"
        gltf-model="url(library/env.glb)"
        clickable-environment
        position="0 0 0"
        rotation="0 0 0"
        scale="1 1 1"
        shadow="cast: true; receive: true"
      ></a-entity>

      <!-- Camera -->
      <a-entity
        camera 
        look-controls="enabled: false;" 
        orbit-controls="target: 2 0 0; minDistance: 5; maxDistance: 35; initialPosition: 10 15 60 rotateSpeed: 0.5"
      ></a-entity>

      <!-- Sky -->
      <a-sky color="#FFCF56"></a-sky>
    </a-scene>
  </body>
</html>
