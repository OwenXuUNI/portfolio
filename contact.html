<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="contact.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
</head>
<body>
    <h1>Lets get in touch</h1>

    <form class="contact-form">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Your name"><br>
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="yourname@email.com"><br>
        <label for="phone">Phone</label>
        <input type="tel" id="phone" placeholder="1234-567-890"><br>
        <label for="message">Message</label>
        <textarea id="message" rows="5" placeholder="Let me know a little about your vision"></textarea><br>
        <button type="button" onclick="window.location.href='confirm.html'">Send</button>
    </form>



    <div id="bottom_container"></div>
    <a href="index.html"><img id="logo" src="library/logo.png" alt="logo icon"></a>
</body>
</html>
